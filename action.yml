name: PortfolioFy
description: Generates a portfolio using Jinja2 + Tailwind (no Node)
author: Araceli Ponce

inputs:
  gh_token:
    description: "GitHub Token"
    required: true
  gh_username:
    description: "GitHub Username"
    required: true

runs:
  using: "composite"
  steps:
    #
    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ github.action_path }}/requirements.txt" ]; then 
          pip install -r ${{ github.action_path }}/requirements.txt
        fi
      shell: bash

    #
    - name: Download Tailwind CLI
      run: |
        mkdir -p .tailwind
        curl -L https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o .tailwind/tailwind
        chmod +x .tailwind/tailwind
      shell: bash

    #
    - name: Build CSS
      run: |
        .tailwind/tailwind -i ${{ github.action_path }}/input.css -o main.css --minify
      shell: bash

    #
    - name: Generate HTML
      run: python ${{ github.action_path }}/index.py
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        GH_USERNAME: ${{ inputs.gh_username }}

branding:
  icon: "award"
  color: "green"
