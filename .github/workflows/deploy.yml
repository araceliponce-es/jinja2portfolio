name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub jinja2 python-dotenv

      - name: Generate HTML
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ github.actor }}
        run: python index.py

      - name: Download Tailwind CSS standalone binary (linux-x64 for easiest compatibility with the Ubuntu runner)
        run: |
          mkdir -p .tailwind
          curl -L https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o .tailwind/tailwind
          chmod +x .tailwind/tailwind

      - name: Build Tailwind CSS
        run: |
          mkdir -p dist
          ./.tailwind/tailwind -i ./input.css -o ./dist/main.css --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
